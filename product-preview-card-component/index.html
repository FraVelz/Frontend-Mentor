<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <title>Frontend Mentor | Product preview card component</title>

    <meta
      name="description"
      content="Solution to the Frontend Mentor product preview card challenge: perfume product card with responsive image and pricing."
    />
    <link rel="canonical" href="https://fravelz.github.io/Frontend-Mentor/product-preview-card-component/" />
    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://fravelz.github.io/Frontend-Mentor/product-preview-card-component/" />
    <meta property="og:title" content="Frontend Mentor | Product preview card component" />
    <meta
      property="og:description"
      content="Product preview card — responsive card with picture element and typography."
    />
    <meta
      property="og:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/product-preview-card-component/screenshot.png?raw=true"
    />

    <meta property="og:image:alt" content="Product preview card challenge preview" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Frontend Mentor | Product preview card component" />
    <meta name="twitter:description" content="Product preview card — Frontend Mentor solution." />
    <meta
      name="twitter:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/product-preview-card-component/screenshot.png?raw=true"
    />

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

    <link rel="stylesheet" href="./styles/font.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="flex h-screen items-center justify-center bg-[#F2EAE2]">
    <main
      class="flex max-w-[350px] flex-col rounded-[0.5rem] bg-white max-md:overflow-hidden md:max-w-[600px] md:flex-row"
    >
      <picture>
        <source srcset="./images/image-product-desktop.jpg" media="(min-width: 768px)" />
        <img
          draggable="false"
          class="select-none md:min-h-[456px] md:min-w-[300px]"
          src="./images/image-product-mobile.jpg"
          alt="Perfume"
        />
      </picture>

      <div class="flex flex-col gap-6 p-8 md:gap-8">
        <div class="flex flex-col gap-6">
          <p class="tag text-[#6C7289] uppercase">Perfume</p>
          <h1 class="title text-[#1C232B]">Gabrielle Essence Eau De Parfum</h1>

          <p class="description text-[#6C7289]">
            A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of
            CHANEL.
          </p>
        </div>

        <p class="price flex items-center gap-4 text-[#3D8168]">
          $149.99
          <span class="text-[#6C7289] line-through">$169.99</span>
        </p>

        <button
          class="button flex cursor-pointer justify-center gap-2 rounded-[0.5rem] bg-[#3D8168] px-8 py-4 text-white hover:bg-[#1A4032] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#3D8168]"
        >
          <img src="./images/icon-cart.svg" alt="Cart" />
          Add to Cart
        </button>
      </div>
    </main>
  </body>
</html>
