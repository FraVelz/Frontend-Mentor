<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <title>Frontend Mentor | Social links profile</title>

    <meta
      name="description"
      content="Solution to the Frontend Mentor social links profile challenge: profile card with avatar and social links."
    />
    <link rel="canonical" href="https://fravelz.github.io/Frontend-Mentor/social-links-profile/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fravelz.github.io/Frontend-Mentor/social-links-profile/" />
    <meta property="og:title" content="Frontend Mentor | Social links profile" />
    <meta property="og:description" content="Social links profile — Tailwind CSS profile card layout." />
    <meta
      property="og:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/social-links-profile/screenshot.png?raw=true"
    />

    <meta property="og:image:alt" content="Social links profile challenge preview" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Frontend Mentor | Social links profile" />
    <meta name="twitter:description" content="Social links profile — Frontend Mentor solution." />
    <meta
      name="twitter:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/social-links-profile/screenshot.png?raw=true"
    />

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      :root {
        --color-link-bg: #333333;
        --color-accent: #c4f82a;
        --color-on-accent: #333333;
        --color-text-primary: #ffffff;

        --profile-leading: 1.5;
        --profile-tracking: 0;
        --focus-ring-width: 0.0625rem;
        --focus-ring-offset: 0.0625rem;
      }

      @font-face {
        font-family: 'Inter';
        src: url('./assets/fonts/static/Inter-Bold.ttf') format('truetype');
        font-weight: 800;
        font-style: normal;
      }

      @font-face {
        font-family: 'Inter';
        src: url('./assets/fonts/static/Inter-SemiBold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
      }

      @font-face {
        font-family: 'Inter';
        src: url('./assets/fonts/static/Inter-Regular.ttf') format('truetype');
        font-weight: 500;
        font-style: normal;
      }

      body {
        font-family: 'Inter', sans-serif;
      }

      .title,
      .location,
      .description,
      .social-links {
        line-height: var(--profile-leading);
        letter-spacing: var(--profile-tracking);
      }

      .title {
        font-weight: 700;
        font-size: clamp(1.25rem, 2.5vw + 1rem, 1.5rem);
      }

      .location {
        font-weight: 800;
        font-size: 0.875rem;
      }

      .description {
        font-weight: 500;
        font-size: 0.875rem;
      }

      .social-links {
        font-weight: 800;
        font-size: 0.875rem;
        background-color: var(--color-link-bg);
        color: var(--color-text-primary);
      }

      .social-links:hover {
        background-color: var(--color-accent);
        color: var(--color-on-accent);
      }

      .social-links:focus:not(:focus-visible) {
        outline: none;
      }

      .social-links:focus-visible {
        outline: var(--focus-ring-width) solid var(--color-accent);
        outline-offset: var(--focus-ring-offset);
      }
    </style>
  </head>

  <body class="flex min-h-screen items-center justify-center bg-[#141414] md:p-10">
    <main
      class="m-6 flex h-fit w-full min-w-[19.5625rem] flex-col gap-6 rounded-lg bg-[#1F1F1F] p-6 text-center md:m-0 md:max-w-96 md:p-10"
    >
      <header class="flex flex-col gap-6 text-center">
        <img
          draggable="false"
          class="m-auto size-[5.5rem] rounded-full select-none"
          src="./assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall"
        />

        <div class="flex flex-col gap-1">
          <h1 class="title text-white">Jessica Randall</h1>
          <h2 class="location text-[#c4f82a]">London, United Kingdom</h2>
        </div>
      </header>

      <p class="description text-white">"Front-end developer and avid reader."</p>

      <ul class="flex list-none flex-col gap-4 p-0">
        <li class="w-full">
          <a class="social-links block w-full rounded-xl p-3 text-center transition-all duration-500" href="#">GitHub</a>
        </li>
        <li class="w-full">
          <a class="social-links block w-full rounded-xl p-3 text-center transition-all duration-500" href="#"
            >Frontend Mentor</a
          >
        </li>
        <li class="w-full">
          <a class="social-links block w-full rounded-xl p-3 text-center transition-all duration-500" href="#">LinkedIn</a>
        </li>
        <li class="w-full">
          <a class="social-links block w-full rounded-xl p-3 text-center transition-all duration-500" href="#">Twitter</a>
        </li>
        <li class="w-full">
          <a class="social-links block w-full rounded-xl p-3 text-center transition-all duration-500" href="#"
            >Instagram</a
          >
        </li>
      </ul>
    </main>
  </body>
</html>
