<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Frontend quiz app</title>
    <meta
      name="description"
      content="Interactive quiz to practice frontend topics: choose HTML, CSS, JavaScript, or Accessibility, answer multiple-choice questions, see your score, replay, and switch light or dark theme."
    />
    <link rel="canonical" href="https://fravelz.github.io/Frontend-Mentor/frontend-quiz-app/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fravelz.github.io/Frontend-Mentor/frontend-quiz-app/" />
    <meta property="og:title" content="Frontend Mentor | Frontend quiz app" />
    <meta
      property="og:description"
      content="Interactive quiz to practice frontend topics: choose a subject, answer questions, track your score, and toggle light or dark theme."
    />
    <meta
      property="og:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/frontend-quiz-app/screenshot.png?raw=true"
    />
    <meta property="og:image:alt" content="Frontend quiz app challenge preview" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Frontend Mentor | Frontend quiz app" />
    <meta
      name="twitter:description"
      content="Quiz app with subjects, scoring, replay, and theme toggle—built for the Frontend Mentor challenge."
    />
    <meta
      name="twitter:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/frontend-quiz-app/screenshot.png?raw=true"
    />
    <link rel="icon" type="image/png" href="./images/favicon-32x32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <!-- En Tailwind v4, dark: depende de prefers-color-scheme; redefinimos para usar clase .dark en <html> -->
    <style type="text/tailwindcss">
      @import 'tailwindcss';
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="./script.js" defer></script>
  </head>
  <body class="m-0 font-['Rubik',system-ui,sans-serif] antialiased">
    <!-- Asegura que Tailwind genere clases de fondo de iconos (también referenciadas en script.js) -->
    <div class="pointer-events-none fixed top-0 left-0 h-px w-px overflow-hidden opacity-0" aria-hidden="true">
      <span class="bg-blue-50 bg-green-100 bg-orange-50 bg-purple-100"></span>
    </div>

    <div
      id="app"
      class="min-h-dvh min-h-screen overflow-x-hidden bg-[#F4F6FA] bg-[url('images/pattern-background-mobile-light.svg')] bg-no-repeat text-sm leading-[1.5] text-[#313E51] min-[768px]:bg-[url('images/pattern-background-tablet-light.svg')] min-[768px]:text-[20px] min-[1440px]:bg-[url('images/pattern-background-desktop-light.svg')] min-[1440px]:bg-[length:100%] dark:bg-[#313E51] dark:bg-[url('images/pattern-background-mobile-dark.svg')] min-[768px]:dark:bg-[url('images/pattern-background-tablet-dark.svg')] min-[1440px]:dark:bg-[url('images/pattern-background-desktop-dark.svg')]"
    >
      <p id="load-failed" class="hidden p-8 text-center dark:text-white" role="alert">
        Could not load <code>data/data.json</code>. Serve this folder over HTTP (e.g.
        <code>python -m http.server</code>), not <code>file://</code>.
      </p>

      <div id="app-inner" class="min-h-dvh min-h-screen">
        <header
          class="flex h-[4.5rem] justify-between px-6 py-4 min-[768px]:h-[8.5rem] min-[768px]:px-16 min-[768px]:py-10 min-[1440px]:h-[13.875rem] min-[1440px]:px-[8.75rem]"
        >
          <div id="header-subject" class="flex hidden min-w-0 items-center" aria-hidden="true">
            <div class="flex items-center gap-4 min-[768px]:gap-6">
              <div
                id="header-subject-icon-wrap"
                class="flex h-10 w-10 shrink-0 items-center justify-center rounded-md min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-lg"
              >
                <img
                  id="header-subject-icon"
                  class="h-7 w-7 min-[768px]:h-10 min-[768px]:w-10"
                  width="40"
                  height="40"
                  src="images/icon-html.svg"
                  alt=""
                />
              </div>
              <p id="header-subject-title" class="text-lg leading-none font-medium min-[768px]:text-[28px]">HTML</p>
            </div>
          </div>

          <div id="header-theme-group" class="ml-auto flex items-center gap-2 min-[768px]:gap-4">
            <img
              id="icon-sun"
              class="h-4 w-4 min-[768px]:h-6 min-[768px]:w-6"
              width="24"
              height="24"
              src="images/icon-sun-light.svg"
              alt=""
            />
            <button
              type="button"
              id="theme-toggle"
              class="flex h-5 w-8 cursor-pointer items-center rounded-full bg-[#A729F5] p-1 min-[768px]:h-7 min-[768px]:w-12"
              aria-label="Toggle light or dark theme"
            >
              <span
                id="theme-knob"
                class="aspect-square h-full translate-x-3 rounded-full bg-white transition-transform duration-200 min-[768px]:translate-x-5"
              ></span>
            </button>
            <img
              id="icon-moon"
              class="h-4 w-4 min-[768px]:h-6 min-[768px]:w-6"
              width="24"
              height="24"
              src="images/icon-moon-light.svg"
              alt=""
            />
          </div>
        </header>

        <main
          class="flex justify-center px-6 py-8 min-[768px]:px-16 min-[768px]:pt-2 min-[768px]:pb-10 min-[1440px]:px-[8.75rem] min-[1440px]:pt-0.5 min-[1440px]:pb-20"
        >
          <div class="w-full max-w-7xl min-w-0 text-[#313E51] dark:text-white">
            <!-- Pantalla: inicio -->
            <section
              id="screen-start"
              class="flex w-full max-w-7xl grow flex-col gap-10 min-[768px]:gap-16 min-[1440px]:w-full min-[1440px]:min-w-0 min-[1440px]:flex-row min-[1440px]:gap-32"
            >
              <div class="flex flex-col gap-4 min-[1440px]:gap-12">
                <h1 class="text-[40px] leading-none font-light min-[768px]:text-[64px]">
                  <span class="block">Welcome to the</span>
                  <span class="mt-2 block font-medium">Frontend Quiz!</span>
                </h1>
                <p class="text-[#626C7F] italic dark:text-[#ABC1E1]">Pick a subject to get started.</p>
              </div>
              <div
                class="grid grow auto-rows-[72px] grid-cols-1 gap-4 min-[768px]:auto-rows-[88px] min-[768px]:gap-6 min-[1440px]:auto-rows-[104px] min-[1440px]:gap-4"
              >
                <button
                  type="button"
                  class="start-pick flex w-full items-center justify-between gap-2 rounded-xl bg-white p-4 text-left shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:rounded-3xl min-[1440px]:p-6 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                  data-quiz-index="0"
                  aria-label="Start HTML quiz"
                >
                  <span class="flex items-center gap-4 min-[768px]:gap-6">
                    <span
                      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-md bg-orange-50 min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-lg"
                    >
                      <img
                        class="h-7 w-7 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-html.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </span>
                    <span class="text-lg leading-none font-medium min-[768px]:text-[28px]">HTML</span>
                  </span>
                </button>
                <button
                  type="button"
                  class="start-pick flex w-full items-center justify-between gap-2 rounded-xl bg-white p-4 text-left shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:rounded-3xl min-[1440px]:p-6 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                  data-quiz-index="1"
                  aria-label="Start CSS quiz"
                >
                  <span class="flex items-center gap-4 min-[768px]:gap-6">
                    <span
                      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-md bg-green-100 min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-lg"
                    >
                      <img
                        class="h-7 w-7 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-css.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </span>
                    <span class="text-lg leading-none font-medium min-[768px]:text-[28px]">CSS</span>
                  </span>
                </button>
                <button
                  type="button"
                  class="start-pick flex w-full items-center justify-between gap-2 rounded-xl bg-white p-4 text-left shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:rounded-3xl min-[1440px]:p-6 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                  data-quiz-index="2"
                  aria-label="Start JavaScript quiz"
                >
                  <span class="flex items-center gap-4 min-[768px]:gap-6">
                    <span
                      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-md bg-blue-50 min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-lg"
                    >
                      <img
                        class="h-7 w-7 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-js.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </span>
                    <span class="text-lg leading-none font-medium min-[768px]:text-[28px]">JavaScript</span>
                  </span>
                </button>
                <button
                  type="button"
                  class="start-pick flex w-full items-center justify-between gap-2 rounded-xl bg-white p-4 text-left shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:rounded-3xl min-[1440px]:p-6 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                  data-quiz-index="3"
                  aria-label="Start Accessibility quiz"
                >
                  <span class="flex items-center gap-4 min-[768px]:gap-6">
                    <span
                      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-md bg-purple-100 min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-lg"
                    >
                      <img
                        class="h-7 w-7 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-accessibility.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </span>
                    <span class="text-lg leading-none font-medium min-[768px]:text-[28px]">Accessibility</span>
                  </span>
                </button>
              </div>
            </section>

            <!-- Pantalla: quiz (oculta al inicio) -->
            <section
              id="screen-quiz"
              class="flex hidden w-full max-w-7xl grow flex-col gap-10 min-[1440px]:min-w-0 min-[1440px]:flex-row min-[1440px]:gap-32"
            >
              <div class="w-full shrink-0 min-[1440px]:w-[30rem]">
                <h2 id="quiz-heading" class="mb-4 text-[#626C7F] italic min-[768px]:mb-6 dark:text-[#ABC1E1]">
                  Question 1 of 10
                </h2>
                <p
                  id="quiz-question-text"
                  class="mb-6 text-[20px] leading-[1.2] font-medium min-[768px]:mb-10 min-[768px]:text-[36px] min-[1440px]:mb-[11.5rem]"
                >
                  &nbsp;
                </p>
                <div class="h-4 rounded-full bg-white p-1 dark:bg-[#3B4D66]">
                  <div
                    id="quiz-progress-bar"
                    class="h-full w-0 rounded-full bg-[#A729F5] transition-[width] duration-300"
                  ></div>
                </div>
              </div>

              <div class="flex w-full min-w-0 grow flex-col gap-4 min-[768px]:gap-8">
                <div
                  id="quiz-options"
                  class="grid auto-rows-[72px] grid-cols-1 gap-4 min-[768px]:auto-rows-[88px] min-[768px]:gap-6 min-[1440px]:auto-rows-[104px] min-[1440px]:gap-4"
                >
                  <button
                    type="button"
                    class="quiz-option group flex w-full items-center justify-between gap-2 rounded-xl border-[3px] border-transparent bg-white p-4 text-left shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:rounded-3xl min-[1440px]:p-6 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                    data-option-index="0"
                    aria-pressed="false"
                  >
                    <span class="flex min-w-0 items-center gap-4 min-[768px]:gap-8">
                      <span
                        class="option-letter flex h-10 w-10 shrink-0 items-center justify-center rounded-md text-lg leading-none font-medium min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-xl min-[768px]:text-[28px]"
                        >A</span
                      >
                      <span
                        class="option-label min-w-0 text-lg leading-none font-medium min-[768px]:text-[28px]"
                      ></span>
                    </span>
                    <span class="option-icons flex shrink-0 items-center gap-1" aria-hidden="true">
                      <img
                        class="icon-correct hidden h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-correct.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                      <img
                        class="icon-wrong hidden h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-incorrect.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </span>
                  </button>
                  <button
                    type="button"
                    class="quiz-option group flex w-full items-center justify-between gap-2 rounded-xl border-[3px] border-transparent bg-white p-4 text-left shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:rounded-3xl min-[1440px]:p-6 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                    data-option-index="1"
                    aria-pressed="false"
                  >
                    <span class="flex min-w-0 items-center gap-4 min-[768px]:gap-8">
                      <span
                        class="option-letter flex h-10 w-10 shrink-0 items-center justify-center rounded-md text-lg leading-none font-medium min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-xl min-[768px]:text-[28px]"
                        >B</span
                      >
                      <span
                        class="option-label min-w-0 text-lg leading-none font-medium min-[768px]:text-[28px]"
                      ></span>
                    </span>
                    <span class="option-icons flex shrink-0 items-center gap-1" aria-hidden="true">
                      <img
                        class="icon-correct hidden h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-correct.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                      <img
                        class="icon-wrong hidden h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-incorrect.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </span>
                  </button>
                  <button
                    type="button"
                    class="quiz-option group flex w-full items-center justify-between gap-2 rounded-xl border-[3px] border-transparent bg-white p-4 text-left shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:rounded-3xl min-[1440px]:p-6 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                    data-option-index="2"
                    aria-pressed="false"
                  >
                    <span class="flex min-w-0 items-center gap-4 min-[768px]:gap-8">
                      <span
                        class="option-letter flex h-10 w-10 shrink-0 items-center justify-center rounded-md text-lg leading-none font-medium min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-xl min-[768px]:text-[28px]"
                        >C</span
                      >
                      <span
                        class="option-label min-w-0 text-lg leading-none font-medium min-[768px]:text-[28px]"
                      ></span>
                    </span>
                    <span class="option-icons flex shrink-0 items-center gap-1" aria-hidden="true">
                      <img
                        class="icon-correct hidden h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-correct.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                      <img
                        class="icon-wrong hidden h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-incorrect.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </span>
                  </button>
                  <button
                    type="button"
                    class="quiz-option group flex w-full items-center justify-between gap-2 rounded-xl border-[3px] border-transparent bg-white p-4 text-left shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:rounded-3xl min-[1440px]:p-6 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                    data-option-index="3"
                    aria-pressed="false"
                  >
                    <span class="flex min-w-0 items-center gap-4 min-[768px]:gap-8">
                      <span
                        class="option-letter flex h-10 w-10 shrink-0 items-center justify-center rounded-md text-lg leading-none font-medium min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-xl min-[768px]:text-[28px]"
                        >D</span
                      >
                      <span
                        class="option-label min-w-0 text-lg leading-none font-medium min-[768px]:text-[28px]"
                      ></span>
                    </span>
                    <span class="option-icons flex shrink-0 items-center gap-1" aria-hidden="true">
                      <img
                        class="icon-correct hidden h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-correct.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                      <img
                        class="icon-wrong hidden h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-incorrect.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </span>
                  </button>
                </div>

                <button
                  type="button"
                  id="btn-quiz-submit"
                  class="h-14 w-full cursor-not-allowed rounded-xl bg-[#C084FC] p-4 text-lg leading-none font-medium text-white shadow-[0_16px_40px_rgba(143,160,193,0.14)] transition-all enabled:cursor-pointer enabled:bg-[#A729F5] enabled:shadow-[0_16px_40px_rgba(143,160,193,0.14)] enabled:hover:brightness-105 min-[768px]:h-[5.75rem] min-[768px]:rounded-3xl min-[768px]:p-8 min-[768px]:text-[28px] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)] dark:enabled:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                  disabled
                >
                  Submit Answer
                </button>

                <div id="quiz-error" class="flex hidden items-center justify-center gap-2" role="alert">
                  <img
                    class="h-8 w-8 min-[768px]:h-10 min-[768px]:w-10"
                    src="images/icon-error.svg"
                    width="40"
                    height="40"
                    alt=""
                  />
                  <p
                    class="text-lg leading-none font-medium text-[#EE5454] min-[768px]:text-2xl min-[768px]:font-normal dark:text-white"
                  >
                    Please select an answer
                  </p>
                </div>
              </div>
            </section>

            <!-- Pantalla: puntuación -->
            <section
              id="screen-score"
              class="flex hidden w-full max-w-7xl grow flex-col gap-10 min-[768px]:gap-16 min-[1440px]:w-full min-[1440px]:min-w-0 min-[1440px]:flex-row min-[1440px]:gap-36"
            >
              <h1 class="text-[40px] leading-none font-light min-[768px]:text-[64px]">
                <span class="block">Quiz completed</span>
                <span class="mt-2 block font-medium min-[768px]:mt-4 min-[1440px]:mt-2">You scored...</span>
              </h1>
              <div class="flex w-full min-w-0 grow flex-col gap-4 min-[768px]:gap-8">
                <div
                  class="flex flex-col items-center gap-4 rounded-xl bg-white p-8 shadow-[0_16px_40px_rgba(143,160,193,0.14)] min-[768px]:gap-10 min-[768px]:rounded-3xl min-[768px]:p-12 dark:bg-[#3B4D66] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                >
                  <div class="flex items-center gap-4 min-[768px]:gap-6">
                    <div
                      id="score-subject-icon-wrap"
                      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-md bg-orange-50 min-[768px]:h-14 min-[768px]:w-14 min-[768px]:rounded-lg"
                    >
                      <img
                        id="score-subject-icon"
                        class="h-7 w-7 min-[768px]:h-10 min-[768px]:w-10"
                        src="images/icon-html.svg"
                        width="40"
                        height="40"
                        alt=""
                      />
                    </div>
                    <p id="score-subject-title" class="text-lg leading-none font-medium min-[768px]:text-[28px]">
                      HTML
                    </p>
                  </div>
                  <div class="flex flex-col items-center gap-4 text-center">
                    <p id="score-value" class="text-[88px] leading-none font-medium min-[768px]:text-[144px]">0</p>
                    <p
                      id="score-out-of"
                      class="text-lg leading-none font-medium text-[#626C7F] min-[768px]:text-2xl dark:text-[#ABC1E1]"
                    >
                      out of 10
                    </p>
                  </div>
                </div>
                <button
                  type="button"
                  id="btn-play-again"
                  class="h-14 w-full cursor-pointer rounded-xl bg-[#A729F5] p-4 text-lg leading-none font-medium text-white shadow-[0_16px_40px_rgba(143,160,193,0.14)] transition-all hover:brightness-105 min-[768px]:h-[5.75rem] min-[768px]:rounded-3xl min-[768px]:p-8 min-[768px]:text-[28px] dark:shadow-[0_16px_40px_rgba(49,62,81,0.14)]"
                >
                  Play Again
                </button>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
