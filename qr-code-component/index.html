<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | QR code component</title>
    <meta name="description"
      content="Solution to the Frontend Mentor QR code component challenge: a card with a QR linking to the platform." />
    <link rel="canonical" href="https://fravelz.github.io/Frontend-Mentor/qr-code-component/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fravelz.github.io/Frontend-Mentor/qr-code-component/" />
    <meta property="og:title" content="Frontend Mentor | QR code component" />
    <meta property="og:description"
      content="QR code component challenge: improve your front-end skills by building projects." />
    <meta property="og:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/qr-code-component/screenshot.png?raw=true" />
    <meta property="og:image:alt" content="QR code component challenge preview" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Frontend Mentor | QR code component" />
    <meta name="twitter:description" content="QR code component — Frontend Mentor solution." />
    <meta name="twitter:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/qr-code-component/screenshot.png?raw=true" />

    <link rel="stylesheet" href="./styles/main.css" />
  </head>

  <body>
    <main class="card">
      <div class="card-image">
        <img
          src="./images/image-qr-code.png"
          alt="QR code linking to Frontend Mentor"
          width="288"
          height="288"
        />
      </div>
      <div class="text">
        <h1>Improve your front-end skills by building projects</h1>
        <p>
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </div>
    </main>

    <script src="./js/main.js" defer></script>
  </body>
</html>
