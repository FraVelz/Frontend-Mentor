<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    @font-face {
      font-family: 'Figtree';
      /* Nombre personalizado */
      src: url('./assets/fonts/static/Figtree-ExtraBold.ttf') format('truetype');
      /* Rutas locales */
      font-weight: 800;
      font-style: normal;
    }

    @font-face {
      font-family: 'Figtree';
      src: url('./assets/fonts/static/Figtree-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
    }


    :root {
      --color-brand-primary: hsl(47, 88%, 63%);

      --color-bg-card: hsl(0, 0%, 100%);
      --color-text-main: hsl(0, 0%, 7%);
      --color-text-muted: hsl(0, 0%, 42%);

      --color-border-soft: hsl(0, 0%, 7%);

      --spacing-md: 24px;
      --spacing-sm: 12px;
      --spacing-xs: 8px;
      --spacing-xxs: 4px;

      --font-sm: 0.75rem;
      /* 12px; */
      --font-md: 0.875rem;
      /* 14px; */
      --font-lg: 1rem;
      /* 16px; */
      --font-xl: 1.5rem;
      /* 20px; */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;

      font-family: 'Figtree', -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      background-color: var(--color-brand-primary);
    }

    .container {
      max-width: 24rem;

      background-color: var(--color-bg-card);
      margin: var(--spacing-md);
      padding: var(--spacing-md);

      border: 1px solid var(--color-border-soft);
      border-radius: var(--spacing-md);
      box-shadow: 10px 10px 0px var(--color-border-soft);

      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .img {
      height: 200px;
      width: 100%;
      border-radius: var(--spacing-sm);
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .tag {
      width: fit-content;

      font-weight: 800;
      font-size: var(--font-md);
      letter-spacing: 0px;
      line-height: 1.5;

      padding: var(--spacing-xxs) var(--spacing-sm);
      border-radius: var(--spacing-xxs);
      background-color: var(--color-brand-primary);
    }

    .date {
      font-weight: 500;
      font-size: var(--font-md);
      letter-spacing: 0px;
      line-height: 1.5;
    }

    .title {
      cursor: pointer;

      font-weight: 800;
      font-size: var(--font-xl);
      letter-spacing: 0px;
      line-height: 1.5;
    }

    .title:hover {
      color: var(--color-brand-primary);
    }

    .description {
      font-weight: 500;
      font-size: var(--font-lg);
      letter-spacing: 0px;
      line-height: 1.5;

      color: var(--color-text-muted);
    }

    .user {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);

      font-weight: 800;
      font-size: var(--font-md);
      letter-spacing: 0px;
      line-height: 1.5;
    }

    .user img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <main class="container">
    <img draggable="false" class="img" src="./assets/images/illustration-article.svg" alt="">

    <div class="content">
      <p class="tag">
        Learning</p>

      <p class="date">
        Published 21 Dec 2023
      </p>

      <h1 class="title">HTML & CSS foundations</h1>

      <p class="description">These languages are the backbone of every website, defining structure, content, and
        presentation.</p>
    </div>

    <div class="user">
      <img draggable="false" src="./assets/images/image-avatar.webp" alt="Greg Hooper">
      Greg Hooper
    </div>
  </main>
</body>

</html>
