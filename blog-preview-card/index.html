<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <title>Frontend Mentor | Blog preview card</title>

    <meta
      name="description"
      content="Solution to the Frontend Mentor blog preview card challenge: card layout with tag, title, lead text and author."
    />
    <link rel="canonical" href="https://fravelz.github.io/Frontend-Mentor/blog-preview-card/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fravelz.github.io/Frontend-Mentor/blog-preview-card/" />
    <meta property="og:title" content="Frontend Mentor | Blog preview card" />
    <meta property="og:description" content="Blog preview card — semantic HTML and CSS for a blog post teaser." />
    <meta
      property="og:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/blog-preview-card/screenshot.png?raw=true"
    />

    <meta property="og:image:alt" content="Blog preview card challenge preview" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Frontend Mentor | Blog preview card" />
    <meta name="twitter:description" content="Blog preview card — Frontend Mentor solution." />
    <meta
      name="twitter:image"
      content="https://github.com/FraVelz/Frontend-Mentor/blob/main/blog-preview-card/screenshot.png?raw=true"
    />

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      @font-face {
        font-family: 'Figtree';
        /* Nombre personalizado */
        src: url('./assets/fonts/static/Figtree-ExtraBold.ttf') format('truetype');
        /* Rutas locales */
        font-weight: 800;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Figtree';
        src: url('./assets/fonts/static/Figtree-Medium.ttf') format('truetype');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --color-brand-primary: hsl(47, 88%, 63%);

        --color-bg-card: hsl(0, 0%, 100%);
        --color-text-main: hsl(0, 0%, 7%);
        --color-text-muted: hsl(0, 0%, 42%);

        --color-border-soft: hsl(0, 0%, 7%);

        --spacing-md: 1.5rem;
        --spacing-sm: 0.75rem;
        --spacing-xs: 0.5rem;
        --spacing-xxs: 0.25rem;

        --shadow-card-offset: 0.625rem;
        --border-thin: 0.0625rem;
        --outline-focus: 0.125rem;
        --radius-focus: 0.125rem;
        --outline-offset-focus: 0.1875rem;

        --font-sm: 0.75rem;
        /* 12px; */
        --font-md: 0.875rem;
        /* 14px; */
        --font-lg: 1rem;
        /* 16px; */
        --font-xl: 1.5rem;
        /* 20px; */
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        padding: var(--spacing-md);

        font-family:
          'Figtree',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          'Noto Sans',
          sans-serif;

        display: flex;
        justify-content: center;
        align-items: center;

        background-color: var(--color-brand-primary);
      }

      .container {
        max-width: 24rem;
        width: 100%;

        background-color: var(--color-bg-card);
        padding: var(--spacing-md);

        border: var(--border-thin) solid var(--color-border-soft);
        border-radius: var(--spacing-md);
        box-shadow: var(--shadow-card-offset) var(--shadow-card-offset) 0 var(--color-border-soft);

        display: flex;
        flex-direction: column;
        gap: var(--spacing-md);
      }

      .img {
        user-select: none;
        display: block;
        width: 100%;
        height: auto;
        border-radius: var(--spacing-sm);
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
      }

      .tag {
        width: fit-content;

        font-weight: 800;
        font-size: var(--font-md);
        letter-spacing: 0;
        line-height: 1.5;

        padding: var(--spacing-xxs) var(--spacing-sm);
        border-radius: var(--spacing-xxs);
        background-color: var(--color-brand-primary);
      }

      .date {
        font-weight: 500;
        font-size: var(--font-md);
        letter-spacing: 0;
        line-height: 1.5;
      }

      .a {
        text-decoration: none;
        color: inherit;
      }

      .title {
        color: var(--color-text-main);
        font-weight: 800;
        font-size: var(--font-xl);
        letter-spacing: 0;
        line-height: 1.5;
      }

      .description {
        font-weight: 500;
        font-size: var(--font-lg);
        letter-spacing: 0;
        line-height: 1.5;

        color: var(--color-text-muted);
      }

      .a:focus-visible {
        outline: var(--outline-focus) solid var(--color-brand-primary);
        outline-offset: var(--outline-offset-focus);
        border-radius: var(--radius-focus);
      }

      .a:hover .title,
      .a:focus-visible .title {
        color: var(--color-brand-primary);
      }

      .user {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);

        font-weight: 800;
        font-size: var(--font-md);
        letter-spacing: 0;
        line-height: 1.5;
      }

      .user img {
        user-select: none;
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
      }
    </style>
  </head>

  <body>
    <main>
      <article class="container">
        <img draggable="false" class="img" src="./assets/images/illustration-article.svg" alt="" />

        <div class="content">
          <p class="tag">Learning</p>

          <time datetime="2023-12-21" class="date"> Published 21 Dec 2023 </time>

          <a class="a" href="#">
            <h1 class="title">HTML &amp; CSS foundations</h1>
          </a>

          <p class="description">
            These languages are the backbone of every website, defining structure, content, and presentation.
          </p>
        </div>

        <footer class="user">
          <img draggable="false" src="./assets/images/image-avatar.webp" alt="Greg Hooper" />
          <span>Greg Hooper</span>
        </footer>
      </article>
    </main>
  </body>
</html>
