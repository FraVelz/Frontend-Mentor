name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          set -e
          mkdir -p _site
          if [ -f index.html ]; then
            cp index.html _site/
          fi
          # Cada carpeta con su propio index.html = un reto con URL propia en Pages
          for dir in */; do
            [ -d "$dir" ] || continue
            name="${dir%/}"
            case "$name" in
              _site) continue ;;
            esac
            if [ -f "${name}/index.html" ]; then
              echo "Incluyendo reto: $name"
              cp -r "$name" _site/
            fi
          done
          ls -la _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
